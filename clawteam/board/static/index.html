<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawTeam 指挥中心</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #030913;
    --bg2: #06111f;
    --bg3: #081b31;
    --surface: rgba(8, 22, 39, 0.92);
    --surface2: rgba(10, 28, 48, 0.88);
    --surface3: rgba(14, 37, 63, 0.9);
    --panel: linear-gradient(180deg, rgba(10,26,45,0.95), rgba(5,15,28,0.96));
    --panel2: linear-gradient(180deg, rgba(13,34,57,0.95), rgba(6,18,34,0.98));
    --border: rgba(96, 176, 255, 0.16);
    --border-strong: rgba(96, 176, 255, 0.36);
    --grid: rgba(84, 168, 255, 0.045);
    --glow: rgba(62, 135, 255, 0.18);
    --glow-strong: rgba(55, 145, 255, 0.28);
    --text: #eef7ff;
    --text-secondary: #a6c0dc;
    --text-tertiary: #7291ad;
    --blue: #59a9ff;
    --cyan: #58d5ff;
    --green: #30d48b;
    --orange: #ffb24f;
    --red: #ff5d74;
    --purple: #8f7dff;
    --yellow: #ffd84d;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 0 0 1px rgba(89,169,255,0.08), 0 18px 40px rgba(0,0,0,0.32);
    --shadow-strong: 0 0 0 1px rgba(89,169,255,0.16), 0 24px 50px rgba(0,0,0,0.44), 0 0 24px rgba(45,118,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(56,128,255,0.18), transparent 24%),
      radial-gradient(circle at 78% 6%, rgba(88,213,255,0.12), transparent 20%),
      radial-gradient(circle at bottom right, rgba(52,115,255,0.10), transparent 24%),
      linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 38%, var(--bg) 100%);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.12) 68%, transparent 100%);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 22%);
    mix-blend-mode: screen;
    opacity: 0.45;
  }

  @keyframes pulseGlow {
    0% { box-shadow: 0 0 0 0 rgba(48,212,139,0.30), 0 0 12px rgba(48,212,139,0.28); }
    50% { box-shadow: 0 0 0 6px rgba(48,212,139,0.02), 0 0 18px rgba(48,212,139,0.42); }
    100% { box-shadow: 0 0 0 0 rgba(48,212,139,0.02), 0 0 12px rgba(48,212,139,0.28); }
  }

  @keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(255,93,116,0.22), 0 0 14px rgba(255,93,116,0.20); }
    50% { box-shadow: 0 0 0 7px rgba(255,93,116,0.02), 0 0 22px rgba(255,93,116,0.34); }
    100% { box-shadow: 0 0 0 0 rgba(255,93,116,0.02), 0 0 14px rgba(255,93,116,0.20); }
  }

  @keyframes breatheCard {
    0% { transform: translateY(0); }
    50% { transform: translateY(-1px); }
    100% { transform: translateY(0); }
  }

  @keyframes dataBlink {
    0% { opacity: 0.85; }
    50% { opacity: 1; }
    100% { opacity: 0.85; }
  }

  select, option {
    color: #eef7ff;
    background: #0b1d31;
  }

  option:checked,
  option:hover {
    background: #17446e;
    color: #ffffff;
  }
</style>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

function statusTone(type, content='') {
  const t = (type || '').toLowerCase();
  const c = (content || '').toLowerCase();
  if (c.includes('final:') || c.includes('all tasks completed')) return { color: 'var(--yellow)', important: true };
  if (c.includes('blocked') || c.includes('need help') || c.includes('error')) return { color: 'var(--red)', danger: true };
  if (t.includes('idle')) return { color: 'var(--purple)' };
  if (t.includes('broadcast')) return { color: 'var(--cyan)' };
  return { color: 'var(--blue)' };
}


function zhMemberType(type) {
  if ((type || '') === 'leader') return '负责人';
  if ((type || '') === 'general-purpose') return '通用执行者';
  return type || '未知角色';
}

function zhTaskSubject(subject) {
  if (!subject) return '';
  return subject
    .replace(/^Analyze\s+(\d{6})\s+recent\s+price\/technical\s+trend$/i, '分析 $1 技术走势')
    .replace(/^Analyze\s+(\d{6})\s+business\/news\/fundamental\s+context$/i, '分析 $1 业务/新闻/基本面')
    .replace(/^Synthesize\s+(\d{6})\s+into\s+one\s+concise\s+final\s+view$/i, '汇总 $1 最终结论')
    .replace(/^Analyze\s+(\d{6})\s+(.+)$/i, '分析 $1（$2）')
    .replace(/^Synthesize\s+the\s+two\s+analyses\s+into\s+one\s+concise\s+final\s+view\s+on\s+(\d{6})$/i, '汇总 $1 最终结论');
}

function zhTeamDescription(desc, name) {
  if (!desc) return '暂无描述';
  let d = desc
    .replace(/^Analyze\s+(\d{6})\s+(.+)$/i, '股票分析：$1 $2')
    .replace(/^Analyze\s+recent\s+OpenClaw\s+update\s+trends.*$/i, '分析 OpenClaw 近期变化趋势')
    .replace(/^Parallel\s+test\s+with\s+two\s+OpenClaw\s+workers$/i, '双 worker 并行测试')
    .replace(/^Dependency\s+\+\s+leader\s+synthesis\s+test.*$/i, '依赖任务 + Leader 汇总测试');
  if (/^stock-\d{6}$/.test(name || '')) {
    d = d.replace(/^Analyze\s+/i, '股票分析：');
  }
  return d;
}

function StatCard({ label, value, color, foot }) {
  return (
    <div style={S.summaryCard(color)}>
      <div style={S.summaryGlow(color)} />
      <div style={S.summaryAccent(color)} />
      <div style={S.summaryLabel}>{label}</div>
      <div style={S.summaryValue(color)}>{value}</div>
      <div style={S.summaryFoot}>{foot}</div>
    </div>
  );
}

function SummaryCards({ taskSummary, members, team, connected, messages }) {
  const onlineAgents = connected ? members.length : 0;
  const leaderStatus = connected ? '在线' : '离线';
  const urgent = (messages || []).filter(m => ((m.content || '').toLowerCase().includes('final:') || (m.content || '').toLowerCase().includes('blocked') || (m.content || '').toLowerCase().includes('need help'))).length;
  return (
    <div style={S.summaryGrid}>
      <StatCard label="待处理" value={taskSummary.pending || 0} color="var(--orange)" foot="等待分配或启动" />
      <StatCard label="进行中" value={taskSummary.in_progress || 0} color="var(--blue)" foot="当前活跃执行" />
      <StatCard label="已完成" value={taskSummary.completed || 0} color="var(--green)" foot="任务已闭环" />
      <StatCard label="已阻塞" value={taskSummary.blocked || 0} color="var(--red)" foot="需要依赖解除" />
      <StatCard label="在线 Agent" value={onlineAgents} color="var(--cyan)" foot={`共 ${members.length} 名成员`} />
      <StatCard label="关键消息" value={urgent} color="var(--purple)" foot={team.leaderName ? `负责人：${team.leaderName}` : '未识别'} />
    </div>
  );
}

function TeamOverview({ teams, onSelect, settings }) {
  const ordered = [...teams].sort((a, b) => {
    const rank = s => s === 'blocked' ? 0 : s === 'running' ? 1 : s === 'completed' ? 2 : 3;
    const byStatus = rank(a.status) - rank(b.status);
    if (byStatus !== 0) return byStatus;
    const ai = a.taskSummary?.in_progress || 0;
    const bi = b.taskSummary?.in_progress || 0;
    if (bi !== ai) return bi - ai;
    return (b.lastEventAt || '').localeCompare(a.lastEventAt || '');
  });
  const totalLimit = Math.max(1, Number(settings.maxTeams || 8));
  const perRow = Math.max(1, Number(settings.teamsPerRow || 4));
  const visible = ordered.slice(0, totalLimit);

  return (
    <SectionChrome title="总看板" sub="重点团队自动排序，点击可直接进入对应团队" right={`共 ${teams.length} 个 Team`}>
      <div style={S.overviewWrap}>
        {visible.length > 0 ? (
          <div style={{...S.overviewTopGrid, gridTemplateColumns: `repeat(${perRow}, minmax(0, 1fr))`}}>
            {visible.map(t => (
              <div key={t.name} style={S.teamHeroCard(t.status)} onClick={() => onSelect(t.name)}>
                <div style={S.teamHeroHead}>
                  <div style={S.teamHeroName}>{t.name}</div>
                  <span style={S.teamStatusPill(t.status)}>{t.status === 'blocked' ? '已阻塞' : t.status === 'running' ? '执行中' : t.status === 'completed' ? '已完成' : '待机'}</span>
                </div>
                <div style={S.teamHeroDesc}>{zhTeamDescription(t.description, t.name)}</div>
                <div style={S.teamMiniGrid}>
                  <div style={S.teamMiniItem}><div style={S.teamMiniValue}>{t.taskSummary?.in_progress || 0}</div><div style={S.teamMiniLabel}>进行中</div></div>
                  <div style={S.teamMiniItem}><div style={S.teamMiniValue}>{t.taskSummary?.completed || 0}</div><div style={S.teamMiniLabel}>已完成</div></div>
                  <div style={S.teamMiniItem}><div style={S.teamMiniValue}>{t.taskSummary?.blocked || 0}</div><div style={S.teamMiniLabel}>阻塞</div></div>
                  <div style={S.teamMiniItem}><div style={S.teamMiniValue}>{t.pendingMessages || 0}</div><div style={S.teamMiniLabel}>消息</div></div>
                </div>
                <div style={S.teamMetaRow}>
                  <span>负责人：{t.leader || '—'}</span>
                  <span>成员：{t.members}</span>
                </div>
              </div>
            ))}
          </div>
        ) : null}
      </div>
    </SectionChrome>
  );
}

function SectionChrome({ title, sub, right, children }) {
  return (
    <div style={S.section}>
      <div style={S.sectionCorner} />
      <div style={S.sectionHeader}>
        <div>
          <div style={S.sectionTitle}>{title}</div>
          <div style={S.sectionSub}>{sub}</div>
        </div>
        {right ? <span style={S.sectionSub}>{right}</span> : null}
      </div>
      {children}
    </div>
  );
}

function MembersPanel({ members }) {
  return (
    <SectionChrome title="成员状态" sub="当前 Team 的协作成员与收件箱状态" right={`${members.length} 人`}>
      <div style={S.membersWrap}>
        {members.map(m => (
          <div key={m.name} style={{...S.memberCard, ...(m.agentType === 'leader' ? S.memberLeaderCard : {})}}>
            <div style={S.memberTop}>
              <div>
                <div style={S.memberName}>{m.name}</div>
                <div style={S.memberType}>{zhMemberType(m.agentType)}</div>
              </div>
              <span style={S.memberBadge(m.agentType)}>{m.agentType === 'leader' ? '负责人' : '执行者'}</span>
            </div>
            {m.user && <div style={{fontSize: 12, color: 'var(--purple)', marginTop: 6}}>{m.user}</div>}
            <span style={S.inboxPill(m.inboxCount)}>{m.inboxCount > 0 ? `${m.inboxCount} 条未读` : '收件箱为空'}</span>
          </div>
        ))}
      </div>
    </SectionChrome>
  );
}

function TaskCard({ task, status }) {
  const extra = status === 'blocked' ? S.blockedTaskCard : status === 'in_progress' ? S.activeTaskCard : {};
  return (
    <div style={{...S.taskCard, ...extra}}>
      <div style={S.taskId}>#{(task.id || '').slice(0, 8)}</div>
      <div style={S.taskSubject}>{zhTaskSubject(task.subject || '')}</div>
      <div style={S.taskOwner}>负责人：{task.owner || '-'}</div>
      {status === 'blocked' && task.blockedBy && task.blockedBy.length > 0 ? (
        <div style={S.taskBlocked}>阻塞于：{task.blockedBy.join(', ')}</div>
      ) : null}
    </div>
  );
}

function TaskBoard({ tasks }) {
  const cols = [
    { key: 'pending', label: '待处理', color: 'var(--orange)' },
    { key: 'in_progress', label: '进行中', color: 'var(--blue)' },
    { key: 'completed', label: '已完成', color: 'var(--green)' },
    { key: 'blocked', label: '已阻塞', color: 'var(--red)' },
  ];
  return (
    <SectionChrome title="任务战况" sub="当前 Team 的任务流转与阻塞情况">
      <div style={S.boardWrap}>
        <div style={S.kanban}>
          {cols.map(col => {
            const items = tasks[col.key] || [];
            return (
              <div key={col.key} style={S.col}>
                <div style={S.colHead(col.color)}>
                  <span style={S.colTitle(col.color)}>{col.label}</span>
                  <span style={S.colCount}>{items.length}</span>
                </div>
                <div style={S.colBody}>
                  {items.length === 0 ? <div style={S.empty}>暂无任务</div> : items.map(t => <TaskCard key={t.id} task={t} status={col.key} />)}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </SectionChrome>
  );
}

function MessagesPanel({ messages }) {
  const sorted = useMemo(() => [...messages].sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || '')), [messages]);
  return (
    <SectionChrome title="消息流" sub="最近回执、同步与协作消息" right={`${messages.length} 条`}>
      <div style={S.messagesWrap}>
        {sorted.length === 0 ? <div style={S.empty}>暂无消息</div> : sorted.map((msg, i) => {
          const time = (msg.timestamp || '').slice(11, 19);
          const date = (msg.timestamp || '').slice(5, 10);
          const tone = statusTone(msg.type, msg.content);
          return (
            <div key={i} style={{...S.msgCard, ...(tone.important ? S.msgImportant : {}), ...(tone.danger ? S.msgDanger : {})}}>
              <div style={S.msgMeta}>
                <span style={S.msgType(tone.color)}>{msg.type || 'message'}</span>
                <span>{msg.from || ''}</span>
                <span style={{opacity:0.7}}>→</span>
                <span>{msg.to || ''}</span>
                <span style={{marginLeft:'auto'}}>{date} {time}</span>
              </div>
              <div style={S.msgBody}>{msg.content || ''}</div>
            </div>
          );
        })}
      </div>
    </SectionChrome>
  );
}

function Dashboard({ data, connected, refreshedAt, teams, onSelectTeam, settings }) {
  const { team, members = [], tasks = {}, taskSummary = {}, messages = [] } = data;
  return (
    <div style={S.shell}>
      <SummaryCards taskSummary={taskSummary} members={members} team={team} connected={connected} messages={messages} />
      <TeamOverview teams={teams} onSelect={onSelectTeam} settings={settings} />
      <div style={S.cockpit}>
        <MembersPanel members={members} />
        <TaskBoard tasks={tasks} />
        <MessagesPanel messages={messages} />
      </div>
    </div>
  );
}

function App() {
  const [teams, setTeams] = useState([]);
  const [current, setCurrent] = useState('');
  const [data, setData] = useState(null);
  const [connected, setConnected] = useState(false);
  const [refreshedAt, setRefreshedAt] = useState('');
  const [busy, setBusy] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [settings, setSettings] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('clawteam-board-settings') || '{}');
    } catch {
      return {};
    }
  });
  const evtRef = useRef(null);
  const serverAddr = window.location.host;
  const titleText = settings.title || 'ClawTeam 指挥中心';

  useEffect(() => {
    document.title = titleText;
  }, [titleText]);

  const loadTeams = (preferred = '') => {
    fetch('/api/overview').then(r => r.json()).then(list => {
      setTeams(list);
      setConnected(true);
      setRefreshedAt(new Date().toLocaleTimeString('zh-CN', { hour12: false }));
      if (preferred && list.some(t => t.name === preferred)) {
        setCurrent(preferred);
      } else if (!list.some(t => t.name === current)) {
        setCurrent('');
        setData(null);
      }
    }).catch(() => {});
  };

  useEffect(() => {
    loadTeams(current);
    const timer = setInterval(() => loadTeams(current), 5000);
    return () => clearInterval(timer);
  }, [current]);

  useEffect(() => {
    if (evtRef.current) { evtRef.current.close(); evtRef.current = null; }
    if (!current) { setData(null); return; }

    const src = new EventSource('/api/events/' + encodeURIComponent(current));
    src.onmessage = e => {
      const d = JSON.parse(e.data);
      if (!d.error) {
        setData(d);
        setConnected(true);
        setRefreshedAt(new Date().toLocaleTimeString('zh-CN', { hour12: false }));
      }
    };
    src.onerror = () => setConnected(false);
    evtRef.current = src;
    return () => src.close();
  }, [current]);

  const handleSaveSettings = () => {
    localStorage.setItem('clawteam-board-settings', JSON.stringify(settings));
    setShowSettings(false);
  };

  const handleCleanup = async () => {
    if (!current || busy) return;
    const ok = window.confirm(`确认清理当前 Team「${current}」吗？\n\n这会删除该 Team 的任务、收件箱、事件记录和关联元数据。`);
    if (!ok) return;
    setBusy(true);
    try {
      const resp = await fetch(`/api/team/${encodeURIComponent(current)}/cleanup`, { method: 'POST' });
      const result = await resp.json();
      if (!resp.ok || result.error) {
        window.alert(result.error || '清理失败');
      } else {
        if (evtRef.current) { evtRef.current.close(); evtRef.current = null; }
        setCurrent('');
        setData(null);
        setConnected(false);
        loadTeams('');
      }
    } catch (e) {
      window.alert('清理失败，请稍后再试');
    } finally {
      setBusy(false);
    }
  };

  return (
    <>
      <div style={S.topbar}>
        <div style={S.topInner}>
          <div style={S.brandWrap} onClick={() => { setCurrent(''); setData(null); setConnected(false); }} title="返回首页总览">
            <div style={S.brandBar} />
            <div style={S.brandTitle}>{titleText}</div>
            <div style={S.brandSub}>多智能体协作总控台</div>
          </div>
          <div style={S.teamControl}>
            <select style={S.teamSwitcher} value={current} onChange={e => setCurrent(e.target.value)}>
              <option value="">请选择 Team</option>
              {teams.map(t => <option key={t.name} value={t.name}>{t.name}{t.description ? ` — ${t.description}` : ''}</option>)}
            </select>
            <button style={S.cleanupBtn(!!current && !busy)} onClick={handleCleanup} disabled={!current || busy}>
              {busy ? '清理中…' : '清理当前 Team'}
            </button>
          </div>
          <div style={S.statusPanel}>
            <div style={S.statusMeta}>
              <div style={S.statusBlock}>
                <div style={S.statusTitle}>访问地址</div>
                <div style={S.statusValue}>{serverAddr}</div>
              </div>
              <div style={S.statusBlock}>
                <div style={S.statusTitle}>最后刷新</div>
                <div style={S.statusValue}>{refreshedAt || '—'}</div>
              </div>
            </div>
            <button style={S.settingsBtn} onClick={() => setShowSettings(true)}>设置</button>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <div style={S.statusDot(connected)}></div>
              <div style={{fontSize:13, fontWeight:700}}>{connected ? '实时连接' : '连接断开'}</div>
            </div>
          </div>
        </div>
      </div>
      {data ? <Dashboard data={data} connected={connected} refreshedAt={refreshedAt} teams={teams} onSelectTeam={setCurrent} settings={settings} /> : (
        teams.length > 0 ? (
          <div style={S.shell}>
            <TeamOverview teams={teams} onSelect={setCurrent} settings={settings} />
          </div>
        ) : (
          <div style={S.heroEmpty}>
            <div style={S.heroTitle}>ClawTeam 指挥中心</div>
            <div style={S.heroSub}>当前暂无 Team，可在创建后回到这里进行总览与调度</div>
          </div>
        )
      )}
      {showSettings ? (
        <div style={S.modalMask} onClick={() => setShowSettings(false)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <div style={S.sectionHeader}>
              <div>
                <div style={S.sectionTitle}>界面设置</div>
                <div style={S.sectionSub}>仅保存在当前浏览器</div>
              </div>
            </div>
            <div style={S.modalBody}>
              <div style={S.field}>
                <label style={S.label}>系统标题</label>
                <input style={S.input} value={settings.title || ''} onChange={e => setSettings({...settings, title: e.target.value})} placeholder="ClawTeam 指挥中心" />
              </div>
              <div style={S.field}>
                <label style={S.label}>总看板每行显示团队数量</label>
                <input style={S.input} type="number" min="1" max="4" value={settings.teamsPerRow || 4} onChange={e => setSettings({...settings, teamsPerRow: Number(e.target.value || 4)})} />
              </div>
              <div style={S.field}>
                <label style={S.label}>总看板显示团队总数量</label>
                <input style={S.input} type="number" min="1" max="50" value={settings.maxTeams || 8} onChange={e => setSettings({...settings, maxTeams: Number(e.target.value || 8)})} />
              </div>
            </div>
            <div style={S.modalActions}>
              <button style={S.actionBtn(false)} onClick={() => setShowSettings(false)}>取消</button>
              <button style={S.actionBtn(true)} onClick={handleSaveSettings}>保存</button>
            </div>
          </div>
        </div>
      ) : null}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
